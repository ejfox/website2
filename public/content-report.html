<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Content Report Card</title>
<style>
  :root { --bg: #0a0a0b; --surface: #141416; --border: #222226; --text: #e4e4e7; --text2: #a1a1aa; --text3: #52525b; --green: #4ade80; --yellow: #fbbf24; --red: #f87171; --purple: #a78bfa; --blue: #60a5fa; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Header */
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 0.5rem; }
  .overall-grade { font-size: 72px; font-weight: 700; line-height: 1; }
  .overall-grade.A { color: var(--green); }
  .overall-grade.B { color: var(--blue); }
  .overall-grade.C { color: var(--yellow); }
  .overall-grade.D, .overall-grade.F { color: var(--red); }
  .generated { font-size: 11px; color: var(--text3); margin-top: 0.5rem; }

  /* Stats grid */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
  .stat { background: var(--surface); padding: 16px; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.75px; color: var(--text3); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; }
  .stat-detail { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* Grade distribution */
  .grade-bar { display: flex; height: 32px; border-radius: 6px; overflow: hidden; margin-bottom: 2rem; gap: 1px; }
  .grade-segment { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #000; min-width: 24px; transition: flex 0.3s; }
  .grade-segment.Aplus, .grade-segment.A { background: var(--green); }
  .grade-segment.B { background: var(--blue); }
  .grade-segment.C { background: var(--yellow); }
  .grade-segment.D { background: #fb923c; }
  .grade-segment.F { background: var(--red); }

  /* Alt coverage meter */
  .meter-section { margin-bottom: 2rem; }
  .meter-section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.75px; color: var(--text3); margin-bottom: 8px; }
  .meter { height: 8px; background: var(--surface); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .meter-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .meter-fill.good { background: var(--green); }
  .meter-fill.mid { background: var(--yellow); }
  .meter-fill.bad { background: var(--red); }
  .meter-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* Issues breakdown */
  .issues-section { margin-bottom: 2rem; }
  .issues-section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.75px; color: var(--text3); margin-bottom: 8px; }
  .issue-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .issue-type { font-size: 11px; color: var(--text2); min-width: 100px; }
  .issue-bar { flex: 1; height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
  .issue-bar-fill { height: 100%; background: var(--purple); border-radius: 3px; }
  .issue-count { font-size: 11px; color: var(--text2); min-width: 40px; text-align: right; }

  /* Post table */
  .posts-section { margin-bottom: 2rem; }
  .posts-section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.75px; color: var(--text3); margin-bottom: 8px; }
  .filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { padding: 4px 10px; font-size: 10px; font-family: inherit; background: var(--surface); color: var(--text2); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
  .filter-btn.active { background: var(--purple); color: #000; border-color: var(--purple); }
  .filter-btn:hover { border-color: var(--text3); }
  .search { padding: 6px 10px; font-size: 11px; font-family: inherit; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 4px; width: 200px; outline: none; }
  .search:focus { border-color: var(--purple); }

  .post-table { width: 100%; border-collapse: collapse; }
  .post-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .post-table th:hover { color: var(--text2); }
  .post-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); font-size: 11px; }
  .post-table tr:hover td { background: rgba(255,255,255,0.02); }

  .grade-badge { display: inline-block; width: 22px; height: 18px; line-height: 18px; text-align: center; font-size: 10px; font-weight: 700; border-radius: 3px; color: #000; }
  .grade-badge.Aplus, .grade-badge.A { background: var(--green); }
  .grade-badge.B { background: var(--blue); }
  .grade-badge.C { background: var(--yellow); }
  .grade-badge.D { background: #fb923c; }
  .grade-badge.F { background: var(--red); }

  .issue-pills { display: flex; gap: 3px; flex-wrap: wrap; }
  .issue-pill { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
  .issue-pill.error { background: rgba(248,113,113,0.2); color: var(--red); }
  .issue-pill.warn { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .issue-pill.info { background: rgba(255,255,255,0.05); color: var(--text3); }

  .post-link { color: var(--text); text-decoration: none; }
  .post-link:hover { color: var(--purple); }
  .img-ratio { font-size: 10px; color: var(--text3); }
  .img-ratio .good { color: var(--green); }
  .img-ratio .bad { color: var(--red); }

  /* Expandable issues */
  .expandable { cursor: pointer; }
  .expand-row td { padding: 8px 8px 8px 36px; background: var(--surface); }
  .expand-issues { font-size: 10px; color: var(--text2); }
  .expand-issues div { padding: 2px 0; }
  .expand-issues .severity-error { color: var(--red); }
  .expand-issues .severity-warn { color: var(--yellow); }
  .expand-issues .severity-info { color: var(--text3); }

  .hidden { display: none; }
  .footer { text-align: center; padding: 2rem 0; font-size: 10px; color: var(--text3); }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>Content Report Card</h1>
    <div class="overall-grade" id="overall-grade"></div>
    <div class="generated" id="generated"></div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="grade-bar" id="grade-bar"></div>

  <div class="meter-section">
    <h2>Alt Text Coverage</h2>
    <div class="meter"><div class="meter-fill" id="alt-meter"></div></div>
    <div class="meter-labels"><span id="alt-label-left"></span><span id="alt-label-right"></span></div>
  </div>

  <div class="issues-section">
    <h2>Issues by Type</h2>
    <div id="issues-breakdown"></div>
  </div>

  <div class="posts-section">
    <h2>All Posts</h2>
    <div class="filters">
      <button class="filter-btn active" data-grade="all">All</button>
      <button class="filter-btn" data-grade="F">F</button>
      <button class="filter-btn" data-grade="D">D</button>
      <button class="filter-btn" data-grade="C">C</button>
      <button class="filter-btn" data-grade="B">B</button>
      <button class="filter-btn" data-grade="A">A</button>
      <button class="filter-btn" data-grade="A+">A+</button>
      <input class="search" type="text" placeholder="Search posts..." id="search">
    </div>
    <table class="post-table">
      <thead><tr>
        <th data-sort="grade" style="width:36px">Grade</th>
        <th data-sort="file">Post</th>
        <th data-sort="images" style="width:60px">Images</th>
        <th data-sort="issues" style="width:60px">Issues</th>
        <th data-sort="words" style="width:60px">Words</th>
      </tr></thead>
      <tbody id="post-table-body"></tbody>
    </table>
  </div>

  <div class="footer">Generated by content-report.mjs</div>
</div>

<script>
const GRADE_ORDER = { 'A+': 0, A: 1, B: 2, C: 3, D: 4, F: 5 }

let report = null
let sortKey = 'grade'
let sortDir = 1
let filterGrade = 'all'
let searchQuery = ''

async function load() {
  const resp = await fetch('/data/content-report.json')
  report = await resp.json()
  render()
}

function render() {
  const s = report.summary

  // Overall grade
  const gradeEl = document.getElementById('overall-grade')
  gradeEl.textContent = s.overallGrade
  gradeEl.className = 'overall-grade ' + s.overallGrade

  document.getElementById('generated').textContent = `Generated ${new Date(s.generated).toLocaleString()} — ${s.posts} posts`

  // Stats
  const pct = parseFloat(s.images.altCoverage)
  document.getElementById('stats').innerHTML = [
    { label: 'Posts', value: s.posts, detail: `${s.grades.F} failing` },
    { label: 'Images', value: s.images.total, detail: `${s.images.broken} broken` },
    { label: 'Alt Coverage', value: s.images.altCoverage, detail: `${s.images.goodAlt} good` },
    { label: 'Errors', value: s.issues.errors, detail: `${s.issues.warnings} warnings` },
    { label: 'Cloudinary Synced', value: s.cloudinaryCache.withAlt, detail: `of ${s.cloudinaryCache.entries}` },
  ].map(s => `<div class="stat"><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div><div class="stat-detail">${s.detail}</div></div>`).join('')

  // Grade bar
  const total = s.posts
  document.getElementById('grade-bar').innerHTML = ['A+', 'A', 'B', 'C', 'D', 'F']
    .filter(g => s.grades[g] > 0)
    .map(g => {
      const pct = (s.grades[g] / total * 100).toFixed(1)
      const cls = g === 'A+' ? 'Aplus' : g
      return `<div class="grade-segment ${cls}" style="flex:${s.grades[g]}" title="${g}: ${s.grades[g]} posts">${g}:${s.grades[g]}</div>`
    }).join('')

  // Alt meter
  const meterFill = document.getElementById('alt-meter')
  meterFill.style.width = s.images.altCoverage
  meterFill.className = 'meter-fill ' + (pct >= 80 ? 'good' : pct >= 50 ? 'mid' : 'bad')
  document.getElementById('alt-label-left').textContent = `${s.images.goodAlt} good`
  document.getElementById('alt-label-right').textContent = `${s.images.junkAlt} junk, ${s.images.emptyAlt} empty`

  // Issues breakdown
  const maxIssues = Math.max(...Object.values(s.issues.byType))
  document.getElementById('issues-breakdown').innerHTML = Object.entries(s.issues.byType)
    .sort((a, b) => b[1] - a[1])
    .map(([type, count]) => `
      <div class="issue-row">
        <span class="issue-type">${type}</span>
        <div class="issue-bar"><div class="issue-bar-fill" style="width:${(count/maxIssues*100).toFixed(1)}%"></div></div>
        <span class="issue-count">${count}</span>
      </div>`).join('')

  renderTable()
}

function renderTable() {
  const posts = report.posts
    .filter(p => filterGrade === 'all' || p.grade === filterGrade)
    .filter(p => !searchQuery || p.file.toLowerCase().includes(searchQuery.toLowerCase()))
    .sort((a, b) => {
      let av, bv
      if (sortKey === 'grade') { av = GRADE_ORDER[a.grade]; bv = GRADE_ORDER[b.grade]; }
      else if (sortKey === 'file') { av = a.file; bv = b.file; }
      else if (sortKey === 'images') { av = a.stats.images; bv = b.stats.images; }
      else if (sortKey === 'issues') { av = a.issues.length; bv = b.issues.length; }
      else if (sortKey === 'words') { av = a.stats.words; bv = b.stats.words; }
      if (av < bv) return -1 * sortDir
      if (av > bv) return 1 * sortDir
      return 0
    })

  document.getElementById('post-table-body').innerHTML = posts.map((p, i) => {
    const cls = p.grade === 'A+' ? 'Aplus' : p.grade
    const slug = p.file.replace('content/blog/', '').replace('.md', '')
    const imgRatio = p.stats.images > 0
      ? `<span class="${p.stats.imagesGood === p.stats.images ? 'good' : 'bad'}">${p.stats.imagesGood}/${p.stats.images}</span>`
      : '<span style="color:var(--text3)">0</span>'
    const errors = p.issues.filter(i => i.severity === 'error').length
    const warns = p.issues.filter(i => i.severity === 'warn').length
    const infos = p.issues.filter(i => i.severity === 'info').length

    const pills = [
      errors > 0 ? `<span class="issue-pill error">${errors} err</span>` : '',
      warns > 0 ? `<span class="issue-pill warn">${warns} warn</span>` : '',
      infos > 0 ? `<span class="issue-pill info">${infos} info</span>` : '',
    ].filter(Boolean).join('')

    const issueDetails = p.issues.map(i =>
      `<div class="severity-${i.severity}">${i.severity === 'error' ? '!' : i.severity === 'warn' ? '~' : '-'} [${i.type}] ${i.msg}</div>`
    ).join('')

    return `
      <tr class="expandable" onclick="toggleExpand(${i})">
        <td><span class="grade-badge ${cls}">${p.grade}</span></td>
        <td><a class="post-link" href="/blog/${slug}" target="_blank">${slug.split('/').pop()}</a></td>
        <td class="img-ratio">${imgRatio}</td>
        <td><div class="issue-pills">${pills || '<span style="color:var(--text3)">-</span>'}</div></td>
        <td style="color:var(--text3)">${p.stats.words.toLocaleString()}</td>
      </tr>
      <tr class="expand-row hidden" id="expand-${i}"><td colspan="5"><div class="expand-issues">${issueDetails || 'No issues'}</div></td></tr>`
  }).join('')
}

function toggleExpand(i) {
  document.getElementById('expand-' + i)?.classList.toggle('hidden')
}

// Filters
document.querySelector('.filters').addEventListener('click', e => {
  if (!e.target.dataset.grade) return
  filterGrade = e.target.dataset.grade
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.grade === filterGrade))
  renderTable()
})

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value
  renderTable()
})

// Sort
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort
    if (sortKey === key) sortDir *= -1
    else { sortKey = key; sortDir = 1; }
    renderTable()
  })
})

load()
</script>
</body>
</html>
