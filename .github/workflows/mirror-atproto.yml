name: Mirror to AT-Proto

on:
  push:
    branches: [main]
    paths:
      - 'content/processed/**/*.json'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install deps
      run: yarn install --frozen-lockfile --ignore-engines

    - name: Mirror published posts to AT-Proto
      env:
        ATPROTO_HANDLE: ${{ secrets.ATPROTO_HANDLE }}
        ATPROTO_APP_PASSWORD: ${{ secrets.ATPROTO_APP_PASSWORD }}
      run: |
        if [ -z "$ATPROTO_APP_PASSWORD" ]; then
          echo "No ATPROTO_APP_PASSWORD secret set — skipping AT-Proto mirror."
          exit 0
        fi
        node scripts/mirror-to-atproto.mjs --live
